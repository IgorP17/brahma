# === HTTP ===
quarkus.http.port=8081

# === DATABASE ===
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=brahma
quarkus.datasource.password=brahma123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/brahma

# === HIBERNATE ORM ===
quarkus.hibernate-orm.log.sql=false
# === HIBERNATE ORM SETTINGS - FIX FOR JSON COLUMNS ===
quarkus.hibernate-orm.mapping.format.global=ignore

# === FLYWAY ===
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=processor
quarkus.flyway.baseline-on-migrate=true

# === KAFKA CONSUMER (for terminal.registration) ===
mp.messaging.incoming.registration-in.bootstrap.servers=localhost:9092
mp.messaging.incoming.registration-in.connector=smallrye-kafka
mp.messaging.incoming.registration-in.topic=terminal.registration
mp.messaging.incoming.registration-in.value.type=com.example.processor.message.TerminalRegistrationMessage
# 🔑 Фиксированный group.id — чтобы offset сохранялся
mp.messaging.incoming.registration-in.group.id=processor-registration-consumer-group
# 🔑 Читать только новые сообщения
mp.messaging.incoming.registration-in.auto.offset.reset=latest

# === REACTIVE MESSAGING (Producer) ===
mp.messaging.outgoing.registered-out.bootstrap.servers=localhost:9092
mp.messaging.outgoing.registered-out.connector=smallrye-kafka
mp.messaging.outgoing.registered-out.topic=terminal.registered

# === LOGGING ===
quarkus.log.level=INFO
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p %c{2} --- %m%n