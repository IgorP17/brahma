apiVersion: v1
kind: Service
metadata:
  name: brahma-webui
  labels:
    app: brahma-webui
spec:
  type: NodePort
  selector:
    app: brahma-webui
  ports:
    - name: http
      protocol: TCP
      port: 8082
      targetPort: 8082
      nodePort: 30082 # сюда ходи http://minikube:30082/
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: brahma-webui
  labels:
    app: brahma-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brahma-webui
  template:
    metadata:
      labels:
        app: brahma-webui
    spec:
      containers:
        - name: webui
          image: brahma-webui:latest
          imagePullPolicy: IfNotPresent  # ← ИСПРАВЛЕНО
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: brahma-config
            - secretRef:
                name: brahma-secret
          env:
            - name: BACKEND_URL
              value: "http://brahma-gateway:8080"  # ← ИСПРАВЛЕНО
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"