# === HTTP SETTINGS ===
quarkus.http.port=8082

# === DATABASE SETTINGS (PostgreSQL) - DEFAULT DATASOURCE ===
# Используем default datasource вместо именованного
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=brahma
quarkus.datasource.password=brahma123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/brahma

# === HIBERNATE ORM SETTINGS - DEFAULT UNIT ===
# Убираем именованный persistence unit
# quarkus.hibernate-orm.gateway.datasource=quarkus.datasource.gateway
# quarkus.hibernate-orm.gateway.packages=com.example.webui.entity

# Используем default ORM
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.bind-parameters=true
quarkus.hibernate-orm.default-schema=gateway
# Добавь эту строку, чтобы отключить конфликт JSON-сериализации
quarkus.hibernate-orm.mapping.format.global=ignore

# === GATEWAY CLIENT (REST Client) ===
quarkus.rest-client.gateway-client.url=http://localhost:8080

# === OPENAPI / SWAGGER UI ===
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# === QUTE TEMPLATES ===
quarkus.qute.suffixes=html