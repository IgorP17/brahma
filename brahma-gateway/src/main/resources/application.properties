# === HTTP SETTINGS ===
quarkus.http.port=8080

# === DATABASE SETTINGS (PostgreSQL) ===
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=brahma
quarkus.datasource.password=brahma123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/brahma

# === HIBERNATE ORM SETTINGS ===
#quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.bind-parameters=true  # ← ! не bind-params, а bind-parameters

# === KAFKA (через Reactive Messaging) ===
# НЕ используем quarkus.kafka.*, только mp.messaging.*
mp.messaging.outgoing.registration-out.connector=smallrye-kafka
mp.messaging.outgoing.registration-out.topic=terminal.registration
mp.messaging.outgoing.registration-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
mp.messaging.outgoing.registration-out.bootstrap.servers=localhost:9092

mp.messaging.incoming.registered-in.connector=smallrye-kafka
mp.messaging.incoming.registered-in.topic=terminal.registered
mp.messaging.incoming.registered-in.value.type=com.example.gateway.TerminalRegisteredMessage
mp.messaging.incoming.registered-in.group.id=gateway-status-sync-group
mp.messaging.incoming.registered-in.auto.offset.reset=latest
mp.messaging.incoming.registered-in.bootstrap.servers=localhost:9092

# === HEALTH CHECKS ===
quarkus.smallrye-health.root-path=/q/health

# === LOGGING ===
quarkus.log.level=INFO

# === DISABLE LIVE CODING (DEV MODE) ===
quarkus.live-reload.enabled=false