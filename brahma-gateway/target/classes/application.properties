# === HTTP SETTINGS ААААА===
quarkus.http.port=8080

# === DATABASE SETTINGS (PostgreSQL) ===
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=brahma
quarkus.datasource.password=brahma123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/brahma

# === HIBERNATE ORM SETTINGS ===
quarkus.hibernate-orm.default-schema=gateway
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.bind-params=true

# === KAFKA SETTINGS (DISABLE DEVSERVICES!) ===
quarkus.kafka.devservices.enabled=false
quarkus.kafka.bootstrap-servers=localhost:9092

mp.messaging.outgoing.registration-topic.connector=smallrye-kafka
mp.messaging.outgoing.registration-topic.topic=terminal.registration
mp.messaging.outgoing.registration-topic.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# === HEALTH CHECKS ===
quarkus.smallrye-health.root-path=/q/health

# === LOGGING ===
quarkus.log.level=INFO